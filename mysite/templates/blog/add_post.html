{% extends 'blog/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4" style="border-radius: 20px;">
            <h3 style="font-weight: 800; color: #764ba2;">✍️ Write a Blog</h3>
            <hr>
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn w-100 mt-2" style="background: linear-gradient(135deg, #667eea, #764ba2); color: white; border-radius: 10px; font-weight: 700;">Publish</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
